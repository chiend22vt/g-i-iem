<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc Mừng Sinh Nhật Phương 🎂❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* --- NỀN VÀ BỐ CỤC --- */
        body {
            margin: 0; padding: 0;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #0f0c29; /* Màu nền đêm tối mộng mơ */
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            color: white;
            transition: background 2s ease;
        }

        /* --- ĐOM ĐÓM BAY LƠ LỬNG --- */
        .firefly {
            position: absolute;
            width: 4px; height: 4px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffb6c1, 0 0 20px #ffb6c1;
            animation: drift linear infinite;
            z-index: 1;
        }
        @keyframes drift {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* --- HỘP THOẠI GLASSMORPHISM --- */
        #story-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 80%;
            max-width: 600px;
            text-align: center;
            z-index: 20;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.3);
            transition: all 1s ease;
        }

        /* --- TEXT & TYPING EFFECT --- */
        #text-container {
            font-family: 'Dancing Script', cursive;
            font-size: 38px;
            line-height: 1.5;
            color: #ff99cc;
            text-shadow: 0 0 5px rgba(255, 153, 204, 0.5);
            min-height: 150px; /* Giữ khung không bị nhảy khi đổi chữ */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cursor {
            display: inline-block;
            width: 3px; background-color: #ff99cc;
            animation: blink 0.7s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* --- NÚT BẤM (Giao diện mới) --- */
        #action-btn {
            margin-top: 30px;
            background: transparent;
            color: #fff;
            border: 2px solid #ff99cc;
            padding: 12px 30px;
            font-size: 18px;
            font-family: 'Quicksand', sans-serif;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 153, 204, 0.3) inset, 0 0 10px rgba(255, 153, 204, 0.3);
            opacity: 0; /* Ẩn nút khi chữ đang gõ */
            pointer-events: none;
        }
        #action-btn.visible {
            opacity: 1; pointer-events: auto;
        }
        #action-btn:hover {
            background: #ff99cc; color: #1a1a2e;
            box-shadow: 0 0 20px #ff99cc;
            transform: scale(1.05);
        }

        /* --- CANVAS CHO PHÁO HOA VÀ TRÁI TIM --- */
        canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 5;
            pointer-events: none;
        }
        #heartCanvas { z-index: 10; }
        #fireworksCanvas { z-index: 5; }

        /* --- CHỮ CUỐI CÙNG HIỆN TRÊN TRÁI TIM --- */
        #final-wishes {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            text-align: center;
            width: 100%;
            display: none;
            opacity: 0;
            transition: opacity 3s ease;
        }
        #final-wishes h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 60px;
            color: #fff;
            text-shadow: 0 0 15px #ff1a4a, 0 0 30px #ff1a4a;
            margin: 0;
        }
        #final-wishes p {
            font-size: 24px; color: #ffd700;
            text-shadow: 0 0 10px #ff8c00;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="music.mp3" loop></audio>

    <canvas id="fireworksCanvas"></canvas>
    <canvas id="heartCanvas"></canvas>

    <div id="story-box">
        <div id="text-container"><span id="typed-text"></span><span class="cursor">|</span></div>
        <button id="action-btn" onclick="nextMessage()">Bắt đầu 💌</button>
    </div>

    <div id="final-wishes">
        <h1>Chúc mừng sinh nhật Phương! 🎂</h1>
        <p>Thế giới của anh, trọn vẹn vì có em ❤️</p>
    </div>

    <script>
        // --- 1. TẠO BACKGROUND ĐOM ĐÓM ---
        function createFireflies() {
            for(let i=0; i<50; i++) {
                let fly = document.createElement('div');
                fly.className = 'firefly';
                fly.style.left = Math.random() * 100 + 'vw';
                fly.style.animationDuration = Math.random() * 5 + 5 + 's';
                fly.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(fly);
            }
        }
        createFireflies();

        // --- 2. CÂU CHUYỆN & LỜI YÊU THƯƠNG (TYPING EFFECT) ---
        const loveStory = [
            "Trái đất có hơn 8 tỷ người...",
            "Nhưng chẳng hiểu sao, anh lại chỉ say đắm duy nhất nụ cười của Phương. 🥰",
            "Hôm nay, 10/6, là một ngày vô cùng đặc biệt.",
            "Ngày mà một thiên thần nhỏ đã giáng trần... 👼",
            "Anh không biết làm thơ, cũng chẳng giỏi nói những lời hoa mỹ...",
            "Nên anh tự tay viết nên thế giới mã code nhỏ bé này...",
            "Dồn hết tình cảm của anh vào từng phím gõ... 💻",
            "Cảm ơn Phương vì đã đến, đã bao dung và yêu thương anh.",
            "Anh hứa sẽ luôn nắm tay em, che chở cho em qua mọi giông bão. ☔",
            "Mong em tuổi mới luôn rạng rỡ, bình an và mãi là công chúa của anh! 👑",
            "Bây giờ, hãy nhắm mắt lại nhé... 3... 2... 1... 🚀"
        ];

        let msgIndex = 0;
        const typedTextSpan = document.getElementById('typed-text');
        const actionBtn = document.getElementById('action-btn');
        let isTyping = false;
        let isMusicPlaying = false;

        // Bật nút lúc đầu
        actionBtn.classList.add('visible');
        typedTextSpan.innerHTML = "Có một bức thư gửi cho Phương... 💌";

        function typeWriter(text, i, cb) {
            if (i < text.length) {
                typedTextSpan.innerHTML += text.charAt(i);
                setTimeout(() => typeWriter(text, i + 1, cb), 50); // Tốc độ gõ 50ms
            } else {
                cb();
            }
        }

        function nextMessage() {
            if (isTyping) return;
            
            // Bật nhạc lần click đầu
            if (!isMusicPlaying) {
                document.getElementById('bgMusic').play().catch(e=>console.log(e));
                isMusicPlaying = true;
            }

            if (msgIndex < loveStory.length) {
                isTyping = true;
                actionBtn.classList.remove('visible');
                typedTextSpan.innerHTML = '';
                
                typeWriter(loveStory[msgIndex], 0, () => {
                    isTyping = false;
                    actionBtn.innerText = "Tiếp tục 💕";
                    actionBtn.classList.add('visible');
                    msgIndex++;
                });
            } else {
                // KẾT THÚC CÂU CHUYỆN -> CHUYỂN CẢNH
                startFinalScene();
            }
        }

        // --- 3. HỆ THỐNG PHÁO HOA (CANVAS) ---
        const fwCanvas = document.getElementById('fireworksCanvas');
        const fwCtx = fwCanvas.getContext('2d');
        let fwParticles = [];
        let isFireworksActive = false;

        function resizeCanvas() {
            fwCanvas.width = window.innerWidth; fwCanvas.height = window.innerHeight;
            heartCanvas.width = window.innerWidth; heartCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class FireworkParticle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.015;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05; // Gravity
                this.life -= this.decay;
            }
            draw() {
                fwCtx.globalAlpha = this.life;
                fwCtx.fillStyle = this.color;
                fwCtx.beginPath();
                fwCtx.arc(this.x, this.y, 2, 0, Math.PI*2);
                fwCtx.fill();
            }
        }

        function createFirework() {
            const x = Math.random() * fwCanvas.width;
            const y = Math.random() * fwCanvas.height / 2; // Nổ ở nửa trên
            const colors = ['#ff0044', '#ff3366', '#ff99cc', '#ffd700', '#00ffcc'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 80; i++) {
                fwParticles.push(new FireworkParticle(x, y, color));
            }
        }

        function animateFireworks() {
            if (!isFireworksActive) return;
            fwCtx.fillStyle = 'rgba(0, 0, 0, 0.2)'; // Tạo hiệu ứng đuôi mờ
            fwCtx.fillRect(0, 0, fwCanvas.width, fwCanvas.height);
            
            if (Math.random() < 0.05) createFirework(); // 5% tỉ lệ nổ pháo hoa mỗi frame

            for (let i = fwParticles.length - 1; i >= 0; i--) {
                let p = fwParticles[i];
                p.update();
                p.draw();
                if (p.life <= 0) fwParticles.splice(i, 1);
            }
            requestAnimationFrame(animateFireworks);
        }

        // --- 4. TRÁI TIM LÝ TUÂN NÂNG CẤP (CANVAS) ---
        const heartCanvas = document.getElementById('heartCanvas');
        const hCtx = heartCanvas.getContext('2d');
        let heartParticles = [];
        let isHeartActive = false;

        function heartMath(t) {
            return {
                x: 160 * Math.pow(Math.sin(t), 3),
                y: 130 * Math.cos(t) - 50 * Math.cos(2*t) - 20 * Math.cos(3*t) - 10 * Math.cos(4*t)
            };
        }

        class HeartParticle {
            constructor(x, y) {
                this.ox = x; this.oy = y;
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.size = Math.random() * 2 + 1.5;
                this.color = Math.random() > 0.2 ? '#ff1a4a' : '#ffd700';
            }
            update(beatScale) {
                // Hạt có xu hướng quay về vị trí gốc + nhịp đập
                const targetX = this.ox * beatScale;
                const targetY = -this.oy * beatScale; // Lật Y
                
                this.vx += (targetX - this.x) * 0.05;
                this.vy += (targetY - this.y) * 0.05;
                
                // Ma sát
                this.vx *= 0.85; this.vy *= 0.85;
                
                // Nhiễu loạn nhẹ
                this.x += this.vx + (Math.random()-0.5)*1.5;
                this.y += this.vy + (Math.random()-0.5)*1.5;
            }
            draw(cx, cy) {
                hCtx.fillStyle = this.color;
                hCtx.beginPath();
                hCtx.arc(cx + this.x, cy + this.y, this.size, 0, Math.PI*2);
                hCtx.fill();
            }
        }

        function initHeart() {
            for (let i = 0; i < 2500; i++) {
                let t = Math.random() * Math.PI * 2;
                let pt = heartMath(t);
                // Phân tán rải rác một chút
                let distance = Math.random();
                heartParticles.push(new HeartParticle(pt.x * distance, pt.y * distance));
            }
        }

        function animateHeart() {
            if (!isHeartActive) return;
            // Xóa mờ để tạo hiệu ứng đuôi sáng rực rỡ
            hCtx.fillStyle = 'rgba(0, 0, 0, 0.3)'; 
            hCtx.fillRect(0, 0, heartCanvas.width, heartCanvas.height);
            
            const time = Date.now() / 1000;
            // Nhịp đập tim: đập mạnh 2 nhịp rồi nghỉ nhẹ
            const beatScale = 1 + 0.15 * Math.abs(Math.sin(time * 3)) * Math.pow(Math.sin(time * 1.5), 2);
            
            const cx = heartCanvas.width / 2;
            const cy = heartCanvas.height / 2 + 50; // Đẩy tim xuống chút để chừa chỗ cho chữ

            hCtx.globalCompositeOperation = 'lighter'; // Phát sáng
            heartParticles.forEach(p => {
                p.update(beatScale);
                p.draw(cx, cy);
            });
            hCtx.globalCompositeOperation = 'source-over';
            
            requestAnimationFrame(animateHeart);
        }

        // --- 5. HÀM CHUYỂN CẢNH CUỐI CÙNG ---
        function startFinalScene() {
            // Ẩn hộp thoại
            const storyBox = document.getElementById('story-box');
            storyBox.style.opacity = '0';
            setTimeout(() => storyBox.style.display = 'none', 1000);

            // Bật nền đen sâu thẳm
            document.body.style.background = '#000';

            // Kích hoạt pháo hoa
            isFireworksActive = true;
            animateFireworks();

            // Kích hoạt trái tim
            setTimeout(() => {
                isHeartActive = true;
                initHeart();
                animateHeart();
                
                // Kích hoạt dòng chữ lớn giữa màn hình
                const finalWishes = document.getElementById('final-wishes');
                finalWishes.style.display = 'block';
                setTimeout(() => finalWishes.style.opacity = '1', 100);
            }, 1000);
        }
    </script>
</body>
</html>
