<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc Mừng Sinh Nhật Phương ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* --- NỀN VÀ BỐ CỤC CHÍNH --- */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #fff0f5 0%, #ffe4e8 100%);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            position: relative;
            perspective: 1000px;
            transition: background 2s ease;
        }

        /* Nền vũ trụ tối sâu thẳm khi đến trang cuối */
        body.space-background {
            background: radial-gradient(circle at center, #1a0010 0%, #000000 100%);
        }

        /* --- CẤU TRÚC THẺ CHỮ (GLASSMORPHISM) --- */
        #card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(255, 105, 180, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 80%;
            z-index: 20;
            transform-style: preserve-3d;
            transition: all 0.1s ease-out, opacity 1s ease;
            position: relative;
        }

        /* --- CHỮ CÂU NÓI --- */
        h1 {
            font-family: 'Great Vibes', cursive;
            color: #ff1a4a;
            font-size: 42px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.7);
            transition: opacity 0.4s ease;
        }

        /* --- NÚT BẤM --- */
        button {
            background: linear-gradient(45deg, #ff6b81, #ff4757);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            font-family: 'Quicksand', sans-serif;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.6);
        }

        button:active {
            transform: scale(0.95);
        }

        /* --- HIỆU ỨNG TRÁI TIM RƠI --- */
        .falling-heart {
            position: absolute;
            top: -10vh;
            animation: fall linear forwards;
            z-index: 10;
            user-select: none;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }

        /* Hiệu ứng mờ dần cho chữ */
        .fade-out { opacity: 0; }
        .fade-in { opacity: 1; }

        /* --- TRẠNG THÁI CUỐI CÙNG (VŨ TRỤ VÀ TRÁI TIM HẠT) --- */
        #final-scene {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 2s ease;
        }

        #heartCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        #final-message {
            z-index: 100;
            position: relative;
            font-family: 'Great Vibes', cursive;
            color: white;
            font-size: 42px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 10px #ff1a4a, 0 0 20px #ff1a4a;
            max-width: 85%;
            margin-top: 150px;
            opacity: 0.9;
        }
        
        /* --- SAO TRÊN TRỜI --- */
        #stars, #stars2, #stars3 {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 1px; height: 1px;
            background: transparent;
            z-index: 10;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="music.mp3" loop></audio>

    <div id="card">
        <h1 id="message">Chúc mừng sinh nhật Phương yêu! 🎂❤️</h1>
        <button id="nextBtn" onclick="nextPage()">Click tiếp nha 💕</button>
    </div>

    <div id="final-scene">
        <div id="stars"></div>
        <div id="stars2"></div>
        <div id="stars3"></div>
        
        <canvas id="heartCanvas"></canvas>
        
        <h1 id="final-message">Chúc mừng sinh nhật 10/6! Cảm ơn em vì đã đến thế giới của anh! 🌌❤️</h1>
    </div>

    <script>
        // --- 1. HIỆU ỨNG THẺ DI CHUYỂN THEO CHUỘT (PARALLAX) ---
        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            if (card.style.display === 'none') return;
            const { clientX, clientY } = e;
            const { innerWidth, innerHeight } = window;
            const rotateX = (clientY - innerHeight / 2) / 30; 
            const rotateY = (innerWidth / 2 - clientX) / 30; 
            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            if (card.style.display !== 'none') {
                card.style.transform = `rotateX(0deg) rotateY(0deg)`;
            }
        });

        // --- 2. HIỆU ỨNG TRÁI TIM RƠI (CHỈ XUẤT HIỆN BAN ĐẦU) ---
        let heartInterval;
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('falling-heart');
            const types = ['❤️', '💖', '💗', '💕', '✨', '🎂', '🎁'];
            heart.innerHTML = types[Math.floor(Math.random() * types.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 4 + 3 + 's'; 
            heart.style.fontSize = Math.random() * 20 + 15 + 'px'; 
            heart.style.opacity = Math.random() * 0.5 + 0.5; 
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 7000); 
        }
        heartInterval = setInterval(createHeart, 250); 

        // --- 3. HIỆU ỨNG NGÔI SAO TRÊN VŨ TRỤ ---
        function createStars() {
            const starCount = 300;
            function addStars(id, size, count) {
                let boxSh = "";
                for (let i = 0; i < count; i++) {
                    boxSh += `${Math.random() * 100}vw ${Math.random() * 100}vh ${size} white, `;
                }
                const starElement = document.getElementById(id);
                starElement.style.boxShadow = boxSh.slice(0, -2); 
                starElement.style.width = size;
                starElement.style.height = size;
            }
            addStars("stars", "1px", starCount);
            addStars("stars2", "2px", Math.floor(starCount / 2));
            addStars("stars3", "3px", Math.floor(starCount / 4));
        }

        // --- 4. HỆ THỐNG HẠT TRÁI TIM LÝ TUÂN 2.0 (TRANG CUỐI) ---
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let particleCount = 2000; 
        let isFinalScene = false;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function heartPoint(t) {
            return {
                x: 160 * Math.pow(Math.sin(t), 3),
                y: 130 * Math.cos(t) - 50 * Math.cos(2*t) - 20 * Math.cos(3*t) - 10 * Math.cos(4*t)
            };
        }

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y; 
                this.vx = (Math.random() - 0.5) * 0.1;
                this.vy = (Math.random() - 0.5) * 0.1;
                const colors = ['#ff1a4a', '#ff4d4d', '#ff3366'];
                this.baseColor = colors[Math.floor(Math.random() * colors.length)];
                this.goldColor = '#ffd700'; 
                this.color = (Math.random() > 0.15) ? this.baseColor : this.goldColor; 
                this.size = Math.random() * 1.8 + 1; 
                this.opacity = Math.random() * 0.7 + 0.3; 
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.98; this.vy *= 0.98;
                if (Math.random() > 0.99) { 
                    this.vx = (Math.random() - 0.5) * 0.4;
                    this.vy = (Math.random() - 0.5) * 0.4;
                }
            }
            draw(beatScale, centerX, centerY) {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                let drawX = centerX + this.x * beatScale;
                let drawY = centerY - this.y * beatScale; 
                ctx.arc(drawX, drawY, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = []; 
            for (let i = 0; i < particleCount; i++) {
                let t = Math.random() * Math.PI * 2;
                let point = heartPoint(t);
                particles.push(new Particle(point.x, point.y)); 
            }
        }

        function animateParticles() {
            if (!isFinalScene) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const pulseSpeed = 1.2; 
            const pulseMagnitude = 0.06; 
            const time = Date.now() / 1000;
            const beatScale = 1 + pulseMagnitude * Math.abs(Math.cos(time * pulseSpeed));

            particles.forEach(p => { p.update(); p.draw(beatScale, centerX, centerY); });
            requestAnimationFrame(animateParticles);
        }

        // --- 5. LOGIC CHUYỂN TRANG ---
        const messages = [
            "Chúc mừng sinh nhật Phương yêu! 🎂❤️",
            "Hôm nay là một ngày vô cùng đặc biệt... ✨",
            "Ngày 10/6, ngày mà thiên thần của anh ra đời! 👼",
            "Anh chúc bé Phương bước sang tuổi mới... 🌸",
            "Lúc nào cũng xinh đẹp, rạng rỡ và vui vẻ! 🥰",
            "Mong mọi điều tốt đẹp nhất sẽ đến với em 🍀",
            "Và hãy luôn hạnh phúc khi ở bên anh nhé! 💕",
            "Anh có một món quà nhỏ bất ngờ dành cho em... 🎁",
            "Chuẩn bị nha... 3... 2... 1... 🚀"
        ];

        let currentPage = 0;
        let isMusicPlaying = false;
        const messageElement = document.getElementById('message');
        const buttonElement = document.getElementById('nextBtn');
        const bgMusic = document.getElementById('bgMusic');
        const finalScene = document.getElementById('final-scene');

        function nextPage() {
            // Bật nhạc khi user tương tác lần đầu
            if (!isMusicPlaying && bgMusic) {
                bgMusic.play().catch(e => console.log("Trình duyệt chặn autoplay audio"));
                isMusicPlaying = true;
            }

            if (currentPage < messages.length - 1) {
                currentPage++;
                messageElement.classList.add('fade-out');
                
                setTimeout(() => {
                    messageElement.innerText = messages[currentPage];
                    
                    if (currentPage === messages.length - 1) {
                        buttonElement.innerText = "Mở quà nhé! 🎁";
                    }
                    messageElement.classList.remove('fade-out');
                    messageElement.classList.add('fade-in');
                }, 400); 
            } else {
                // --- BƯỚC ĐẾN TRANG CUỐI CÙNG ---
                messageElement.classList.add('fade-out');
                buttonElement.style.display = 'none'; 
                
                // 1. Dừng hiệu ứng trái tim rơi
                clearInterval(heartInterval);
                
                // 2. Ẩn thẻ câu nói
                card.style.opacity = '0';
                setTimeout(() => { card.style.display = 'none'; }, 1000);

                // 3. Đổi nền thành vũ trụ tối
                document.body.classList.add('space-background');
                
                // 4. Tạo ngôi sao trên trời
                createStars();

                // 5. Hiện trái tim hạt Lý Tuân 2.0
                finalScene.style.display = 'flex';
                setTimeout(() => { finalScene.style.opacity = '1'; }, 100); 

                // 6. Kích hoạt hệ thống hạt
                isFinalScene = true;
                initParticles();
                animateParticles();
            }
        }
    </script>
</body>
</html>
